[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "20"

# ── Web banking app — SPA routing for /app/* ─────────────────────────────────
[[redirects]]
  from   = "/app/*"
  to     = "/app/index.html"
  status = 200

# ── Landing page — SPA catch-all ─────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
